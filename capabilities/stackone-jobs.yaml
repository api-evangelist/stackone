naftiko: 1.0.0-alpha2
info:
  label: Marketing — Jobs
  description: 'Marketing — Jobs. 2 operations. Lead operation: List Jobs. Self-contained Naftiko capability covering one
    Stackone business surface.'
  tags:
  - Stackone
  - Jobs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STACKONE_API_KEY: STACKONE_API_KEY
capability:
  consumes:
  - type: http
    namespace: stackone-jobs
    baseUri: https://api.stackone.com
    description: Marketing — Jobs business capability. Self-contained, no shared references.
    resources:
    - name: unified-ats-jobs
      path: /unified/ats/jobs
      operations:
      - name: atslistjobs
        method: GET
        description: List Jobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: string
          description: The page number of the results to fetch
        - name: page_size
          in: query
          type: string
          description: The number of results per page
        - name: raw
          in: query
          type: boolean
          description: Indicates that the raw request result is returned
        - name: fields
          in: query
          type: string
          description: The comma separated list of fields to return in the response (if empty, all fields are returned)
        - name: sync_token
          in: query
          type: string
          description: The sync token to select the only updated results
        - name: updated_after
          in: query
          type: string
          description: Use a string with a date to only select results updated after that given date
        - name: proxy
          in: query
          type: object
          description: Query parameters that can be used to pass through parameters to the underlying provider request by
            surrounding them with "proxy" key
        - name: x-account-id
          in: header
          type: string
          description: The account identifier
          required: true
    - name: unified-ats-jobs-id
      path: /unified/ats/jobs/{id}
      operations:
      - name: atsgetjob
        method: GET
        description: Get Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: page
          in: query
          type: string
          description: The page number of the results to fetch
        - name: page_size
          in: query
          type: string
          description: The number of results per page
        - name: raw
          in: query
          type: boolean
          description: Indicates that the raw request result is returned
        - name: fields
          in: query
          type: string
          description: The comma separated list of fields to return in the response (if empty, all fields are returned)
        - name: sync_token
          in: query
          type: string
          description: The sync token to select the only updated results
        - name: updated_after
          in: query
          type: string
          description: Use a string with a date to only select results updated after that given date
        - name: proxy
          in: query
          type: object
          description: Query parameters that can be used to pass through parameters to the underlying provider request by
            surrounding them with "proxy" key
        - name: x-account-id
          in: header
          type: string
          description: The account identifier
          required: true
    authentication:
      type: basic
      username: '{{env.STACKONE_USER}}'
      password: '{{env.STACKONE_PASS}}'
  exposes:
  - type: rest
    namespace: stackone-jobs-rest
    port: 8080
    description: REST adapter for Marketing — Jobs. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/unified/ats/jobs
      name: unified-ats-jobs
      description: REST surface for unified-ats-jobs.
      operations:
      - method: GET
        name: atslistjobs
        description: List Jobs
        call: stackone-jobs.atslistjobs
        with:
          page: rest.page
          page_size: rest.page_size
          raw: rest.raw
          fields: rest.fields
          sync_token: rest.sync_token
          updated_after: rest.updated_after
          proxy: rest.proxy
          x-account-id: rest.x-account-id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/unified/ats/jobs/{id}
      name: unified-ats-jobs-id
      description: REST surface for unified-ats-jobs-id.
      operations:
      - method: GET
        name: atsgetjob
        description: Get Job
        call: stackone-jobs.atsgetjob
        with:
          id: rest.id
          page: rest.page
          page_size: rest.page_size
          raw: rest.raw
          fields: rest.fields
          sync_token: rest.sync_token
          updated_after: rest.updated_after
          proxy: rest.proxy
          x-account-id: rest.x-account-id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stackone-jobs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Marketing — Jobs. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-jobs
      description: List Jobs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stackone-jobs.atslistjobs
      with:
        page: tools.page
        page_size: tools.page_size
        raw: tools.raw
        fields: tools.fields
        sync_token: tools.sync_token
        updated_after: tools.updated_after
        proxy: tools.proxy
        x-account-id: tools.x-account-id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-job
      description: Get Job
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stackone-jobs.atsgetjob
      with:
        id: tools.id
        page: tools.page
        page_size: tools.page_size
        raw: tools.raw
        fields: tools.fields
        sync_token: tools.sync_token
        updated_after: tools.updated_after
        proxy: tools.proxy
        x-account-id: tools.x-account-id
      outputParameters:
      - type: object
        mapping: $.
