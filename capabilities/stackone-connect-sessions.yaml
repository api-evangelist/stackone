naftiko: 1.0.0-alpha2
info:
  label: Marketing — Connect Sessions
  description: 'Marketing — Connect Sessions. 2 operations. Lead operation: Create Connect Session. Self-contained Naftiko
    capability covering one Stackone business surface.'
  tags:
  - Stackone
  - Connect Sessions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STACKONE_API_KEY: STACKONE_API_KEY
capability:
  consumes:
  - type: http
    namespace: stackone-connect-sessions
    baseUri: https://api.stackone.com
    description: Marketing — Connect Sessions business capability. Self-contained, no shared references.
    resources:
    - name: connect_sessions
      path: /connect_sessions
      operations:
      - name: stackonecreateconnectsession
        method: POST
        description: Create Connect Session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: connect_sessions-authenticate
      path: /connect_sessions/authenticate
      operations:
      - name: stackoneauthenticateconnectsession
        method: POST
        description: Authenticate Connect Session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.STACKONE_USER}}'
      password: '{{env.STACKONE_PASS}}'
  exposes:
  - type: rest
    namespace: stackone-connect-sessions-rest
    port: 8080
    description: REST adapter for Marketing — Connect Sessions. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/connect-sessions
      name: connect-sessions
      description: REST surface for connect_sessions.
      operations:
      - method: POST
        name: stackonecreateconnectsession
        description: Create Connect Session
        call: stackone-connect-sessions.stackonecreateconnectsession
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/connect-sessions/authenticate
      name: connect-sessions-authenticate
      description: REST surface for connect_sessions-authenticate.
      operations:
      - method: POST
        name: stackoneauthenticateconnectsession
        description: Authenticate Connect Session
        call: stackone-connect-sessions.stackoneauthenticateconnectsession
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stackone-connect-sessions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Marketing — Connect Sessions. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: create-connect-session
      description: Create Connect Session
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: stackone-connect-sessions.stackonecreateconnectsession
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: authenticate-connect-session
      description: Authenticate Connect Session
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: stackone-connect-sessions.stackoneauthenticateconnectsession
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
