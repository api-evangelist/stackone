naftiko: 1.0.0-alpha2
info:
  label: Marketing — Departments
  description: 'Marketing — Departments. 2 operations. Lead operation: List Departments. Self-contained Naftiko capability
    covering one Stackone business surface.'
  tags:
  - Stackone
  - Departments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STACKONE_API_KEY: STACKONE_API_KEY
capability:
  consumes:
  - type: http
    namespace: stackone-departments
    baseUri: https://api.stackone.com
    description: Marketing — Departments business capability. Self-contained, no shared references.
    resources:
    - name: unified-ats-departments
      path: /unified/ats/departments
      operations:
      - name: atslistdepartments
        method: GET
        description: List Departments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: string
          description: The page number of the results to fetch
        - name: page_size
          in: query
          type: string
          description: The number of results per page
        - name: raw
          in: query
          type: boolean
          description: Indicates that the raw request result is returned
        - name: fields
          in: query
          type: string
          description: The comma separated list of fields to return in the response (if empty, all fields are returned)
        - name: sync_token
          in: query
          type: string
          description: The sync token to select the only updated results
        - name: updated_after
          in: query
          type: string
          description: Use a string with a date to only select results updated after that given date
        - name: proxy
          in: query
          type: object
          description: Query parameters that can be used to pass through parameters to the underlying provider request by
            surrounding them with "proxy" key
        - name: x-account-id
          in: header
          type: string
          description: The account identifier
          required: true
    - name: unified-ats-departments-id
      path: /unified/ats/departments/{id}
      operations:
      - name: atsgetdepartment
        method: GET
        description: Get Department
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: page
          in: query
          type: string
          description: The page number of the results to fetch
        - name: page_size
          in: query
          type: string
          description: The number of results per page
        - name: raw
          in: query
          type: boolean
          description: Indicates that the raw request result is returned
        - name: fields
          in: query
          type: string
          description: The comma separated list of fields to return in the response (if empty, all fields are returned)
        - name: sync_token
          in: query
          type: string
          description: The sync token to select the only updated results
        - name: updated_after
          in: query
          type: string
          description: Use a string with a date to only select results updated after that given date
        - name: proxy
          in: query
          type: object
          description: Query parameters that can be used to pass through parameters to the underlying provider request by
            surrounding them with "proxy" key
        - name: x-account-id
          in: header
          type: string
          description: The account identifier
          required: true
    authentication:
      type: basic
      username: '{{env.STACKONE_USER}}'
      password: '{{env.STACKONE_PASS}}'
  exposes:
  - type: rest
    namespace: stackone-departments-rest
    port: 8080
    description: REST adapter for Marketing — Departments. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/unified/ats/departments
      name: unified-ats-departments
      description: REST surface for unified-ats-departments.
      operations:
      - method: GET
        name: atslistdepartments
        description: List Departments
        call: stackone-departments.atslistdepartments
        with:
          page: rest.page
          page_size: rest.page_size
          raw: rest.raw
          fields: rest.fields
          sync_token: rest.sync_token
          updated_after: rest.updated_after
          proxy: rest.proxy
          x-account-id: rest.x-account-id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/unified/ats/departments/{id}
      name: unified-ats-departments-id
      description: REST surface for unified-ats-departments-id.
      operations:
      - method: GET
        name: atsgetdepartment
        description: Get Department
        call: stackone-departments.atsgetdepartment
        with:
          id: rest.id
          page: rest.page
          page_size: rest.page_size
          raw: rest.raw
          fields: rest.fields
          sync_token: rest.sync_token
          updated_after: rest.updated_after
          proxy: rest.proxy
          x-account-id: rest.x-account-id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stackone-departments-mcp
    port: 9090
    transport: http
    description: MCP adapter for Marketing — Departments. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-departments
      description: List Departments
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stackone-departments.atslistdepartments
      with:
        page: tools.page
        page_size: tools.page_size
        raw: tools.raw
        fields: tools.fields
        sync_token: tools.sync_token
        updated_after: tools.updated_after
        proxy: tools.proxy
        x-account-id: tools.x-account-id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-department
      description: Get Department
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stackone-departments.atsgetdepartment
      with:
        id: tools.id
        page: tools.page
        page_size: tools.page_size
        raw: tools.raw
        fields: tools.fields
        sync_token: tools.sync_token
        updated_after: tools.updated_after
        proxy: tools.proxy
        x-account-id: tools.x-account-id
      outputParameters:
      - type: object
        mapping: $.
