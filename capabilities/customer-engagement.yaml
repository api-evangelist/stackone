naftiko: 1.0.0-alpha2
info:
  label: StackOne Customer Engagement
  description: Unified workflow capability for customer-facing operations using StackOne's unified APIs. Combines CRM (contacts,
    accounts, lists) and Marketing (campaigns, email/push/omni-channel templates) for managing customer relationships and
    multi-channel communications across platforms. Designed for marketing teams, CRM administrators, and AI agents automating
    customer outreach.
  tags:
  - CRM
  - Marketing
  - Customer Engagement
  - Unified API
  - Campaigns
  created: '2026-05-02'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    STACKONE_API_KEY: STACKONE_API_KEY
capability:
  consumes:
  - type: http
    namespace: stackone
    baseUri: https://api.stackone.com
    description: StackOne unified integration platform API
    authentication:
      type: basic
      username: '{{STACKONE_API_KEY}}'
      password: ''
    resources:
    - name: accounts
      path: /accounts
      description: Manage linked integration accounts
      operations:
      - name: list-accounts
        method: GET
        description: List all linked integration accounts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-account
        method: GET
        description: Get a specific linked account
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-account
        method: DELETE
        description: Remove a linked account
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: connect-sessions
      path: /connect_sessions
      description: Manage integration connect sessions
      operations:
      - name: create-connect-session
        method: POST
        description: Create a connect session for onboarding
        body:
          type: json
          data:
            provider: '{{tools.provider}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: hris-employees
      path: /unified/hris/employees
      description: HRIS employee management
      operations:
      - name: list-employees
        method: GET
        description: List employees across HRIS systems
        inputParameters:
        - name: x-account-id
          in: header
          type: string
          required: true
          description: StackOne account ID for the HRIS integration
        - name: page
          in: query
          type: integer
          required: false
        - name: page_size
          in: query
          type: integer
          required: false
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-employee
        method: GET
        description: Get a specific employee
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: x-account-id
          in: header
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-employee
        method: POST
        description: Create a new employee
        inputParameters:
        - name: x-account-id
          in: header
          type: string
          required: true
        body:
          type: json
          data:
            first_name: '{{tools.first_name}}'
            last_name: '{{tools.last_name}}'
            email: '{{tools.email}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-employee
        method: PATCH
        description: Update an employee
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: x-account-id
          in: header
          type: string
          required: true
        body:
          type: json
          data:
            fields: '{{tools.fields}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: hris-time-off
      path: /unified/hris/time_off
      description: HRIS time off request management
      operations:
      - name: list-time-off
        method: GET
        description: List time off requests
        inputParameters:
        - name: x-account-id
          in: header
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-time-off
        method: POST
        description: Create a time off request
        inputParameters:
        - name: x-account-id
          in: header
          type: string
          required: true
        body:
          type: json
          data:
            employee_id: '{{tools.employee_id}}'
            type: '{{tools.type}}'
            start_date: '{{tools.start_date}}'
            end_date: '{{tools.end_date}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: ats-candidates
      path: /unified/ats/candidates
      description: ATS candidate management
      operations:
      - name: list-candidates
        method: GET
        description: List candidates across ATS systems
        inputParameters:
        - name: x-account-id
          in: header
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-candidate
        method: GET
        description: Get a specific candidate
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: x-account-id
          in: header
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: ats-jobs
      path: /unified/ats/jobs
      description: ATS job management
      operations:
      - name: list-jobs
        method: GET
        description: List jobs across ATS systems
        inputParameters:
        - name: x-account-id
          in: header
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-job
        method: GET
        description: Get a specific job
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: x-account-id
          in: header
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: ats-applications
      path: /unified/ats/applications
      description: ATS application tracking
      operations:
      - name: list-applications
        method: GET
        description: List job applications
        inputParameters:
        - name: x-account-id
          in: header
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-application
        method: GET
        description: Get a specific application
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: x-account-id
          in: header
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: crm-contacts
      path: /unified/crm/contacts
      description: CRM contact management
      operations:
      - name: list-contacts
        method: GET
        description: List contacts across CRM systems
        inputParameters:
        - name: x-account-id
          in: header
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-contact
        method: POST
        description: Create a new CRM contact
        inputParameters:
        - name: x-account-id
          in: header
          type: string
          required: true
        body:
          type: json
          data:
            first_name: '{{tools.first_name}}'
            last_name: '{{tools.last_name}}'
            email: '{{tools.email}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: marketing-campaigns
      path: /unified/marketing/campaigns
      description: Marketing campaign management
      operations:
      - name: list-campaigns
        method: GET
        description: List campaigns across marketing platforms
        inputParameters:
        - name: x-account-id
          in: header
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: proxy
      path: /unified/proxy
      description: Proxy requests to provider APIs
      operations:
      - name: proxy-request
        method: POST
        description: Forward a request directly to a provider API
        inputParameters:
        - name: x-account-id
          in: header
          type: string
          required: true
        body:
          type: json
          data:
            path: '{{tools.path}}'
            method: '{{tools.method}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8081
    namespace: stackone-engagement-api
    description: Unified REST API for CRM and marketing operations.
    resources:
    - path: /v1/contacts
      name: contacts
      description: CRM contacts
      operations:
      - method: GET
        name: list-contacts
        description: List CRM contacts
        call: stackone.list-contacts
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-contact
        description: Create a new contact
        call: stackone.create-contact
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/campaigns
      name: campaigns
      description: Marketing campaigns
      operations:
      - method: GET
        name: list-campaigns
        description: List marketing campaigns
        call: stackone.list-campaigns
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9091
    namespace: stackone-engagement-mcp
    transport: http
    description: MCP server for AI-assisted CRM and marketing operations.
    tools:
    - name: list-contacts
      description: List contacts from the connected CRM system (Salesforce, HubSpot, etc.)
      hints:
        readOnly: true
        openWorld: true
      call: stackone.list-contacts
      with:
        x-account-id: tools.account_id
      outputParameters:
      - type: object
        mapping: $.
    - name: create-contact
      description: Create a new contact in the connected CRM system
      hints:
        readOnly: false
      call: stackone.create-contact
      with:
        x-account-id: tools.account_id
      outputParameters:
      - type: object
        mapping: $.
    - name: list-campaigns
      description: List marketing campaigns from the connected platform (Mailchimp, Braze, etc.)
      hints:
        readOnly: true
      call: stackone.list-campaigns
      with:
        x-account-id: tools.account_id
      outputParameters:
      - type: object
        mapping: $.
    - name: proxy-request
      description: Proxy a custom request to any connected provider API
      hints:
        readOnly: false
      call: stackone.proxy-request
      with:
        x-account-id: tools.account_id
      outputParameters:
      - type: object
        mapping: $.
