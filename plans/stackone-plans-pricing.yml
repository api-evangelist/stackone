description: StackOne ships a transparent three-tier model - Starter (free, with 1,000 included action calls per month and $0.003 per additional call), Core (contact-sales, with action calls priced at $0.30 per 1,000 with volume discounts), and Enterprise (contact-sales, same per-call rate with custom contractual terms). Per-call pricing on Core / Enterprise is published; the underlying base subscription for Core and Enterprise is contact-sales.
sources:
  - https://www.stackone.com/pricing
plans:
  - id: stackone-starter
    name: Starter
    type: freemium
    description: Free entry tier with the full unified-API catalog (270+ pre-built connectors, 17,000+ pre-built actions), 1 custom connector, 2 projects, and 1,000 included action calls per month. Additional action calls are billed at $0.003 each.
    entries:
      - label: Base Subscription
        name: subscription
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$0'
        userMultiplied: false
      - label: Included Action Calls
        name: included_action_calls
        type: quota
        metric: action
        limit: 1000
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Additional Action Calls
        name: additional_action_calls
        type: metered
        metric: action
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '$0.003'
        userMultiplied: false
      - label: Custom Connectors
        name: custom_connectors
        type: quota
        metric: connector
        limit: 1
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Projects
        name: projects
        type: quota
        metric: project
        limit: 2
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: 270+ Pre-Built Connectors
      - name: 17,000+ Pre-Built Actions
      - name: Managed Authentication
      - name: Multi-Tenancy Support
      - name: Unified API Access
  - id: stackone-core
    name: Core
    type: subscription
    description: Contact-sales tier that adds premium connectors, unlimited custom connectors, 10 projects, A2A protocol support, multi-region data processing, dedicated Slack support, and SOC2 Type II coverage. Action calls are billed at $0.30 per 1,000 with volume discounts.
    entries:
      - label: Base Subscription
        name: subscription
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: Action Calls
        name: action_calls
        type: metered
        metric: action
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1000
        price: '$0.30 per 1,000 (or lower with volume discounts)'
        userMultiplied: false
      - label: Custom Connectors
        name: custom_connectors
        type: quota
        metric: connector
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Projects
        name: projects
        type: quota
        metric: project
        limit: 10
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: Premium Connectors
      - name: Unlimited Custom Connectors
      - name: A2A Protocol Support
      - name: Multi-Region Data Processing
      - name: Dedicated Slack Support
      - name: SOC2 Type II
  - id: stackone-enterprise
    name: Enterprise
    type: enterprise
    description: Contact-sales tier with all Core features plus professional services, unlimited projects, deployment to any AWS / GCP region, on-premise deployment options, and custom SLAs. Action-call rate is the same $0.30 per 1,000 with volume discounts.
