specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: StackOne
providerId: stackone
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Integrations
  - iPaaS
  - Unified API
  - Rate Limiting
description: StackOne is a unified-API gateway that fans every call out to a downstream SaaS provider (Workday, BambooHR, Greenhouse, etc.). Effective throughput is bounded by the downstream connector's own rate limits, which StackOne mirrors and surfaces to callers. StackOne's developer documentation does not publish a single platform-wide RPS figure; the contract is "respect the downstream connector limit" plus per-tier action-call quotas managed via billing.
sources:
  - https://docs.stackone.com/
  - https://www.stackone.com/pricing
notes: StackOne does not publish a single platform-wide per-second / per-minute figure. Throughput is downstream-connector-bound; volume is metered by action calls (Starter free 1,000/month then $0.003 each, Core / Enterprise $0.30 per 1,000).
responseCodes:
  throttled: 429
limits:
  - name: Per-Connector Downstream Limit
    scope: linked-account/connector
    metric: varies
    limit: see downstream provider rate limits
    notes: StackOne forwards calls to the underlying SaaS connector (Workday, Greenhouse, BambooHR, etc.). The downstream provider's rate limit is the binding ceiling and is propagated back as the response.
  - name: Starter Plan Action-Call Quota
    scope: account
    metric: actions_per_month
    limit: 1000
    timeFrame: month
    notes: Starter tier includes 1,000 action calls per month at no charge; additional calls are billed at $0.003 each rather than throttled.
  - name: Core / Enterprise Action-Call Volume
    scope: account
    metric: actions_per_month
    limit: per contract
    notes: Volume on paid tiers is billed at $0.30 per 1,000 action calls (lower with volume discounts) rather than capped; soft limits are negotiated per contract.
policies:
  - name: Downstream Pass-Through
    description: When a downstream SaaS returns 429, StackOne propagates the throttling response to the caller. Clients should honor Retry-After from the upstream connector and implement exponential backoff with jitter.
  - name: Action-Call Metering
    description: Throughput control on paid tiers is primarily a billing meter (action calls), not a hard rate cap. Soft caps and burst behavior are documented per connector and per contract.
  - name: Connector-Specific Quirks
    description: Specific connectors (e.g. Workday SOAP, NetSuite) have stricter session and concurrent-request limits; consult the per-connector documentation under docs.stackone.com for the binding numbers.
maintainers:
  - name: StackOne
    url: https://www.stackone.com/
