meters:
  - name: action_calls
    unit: action
    aggregation: count
    dimensions:
      - connector
      - linked_account
      - project
      - tenant
  - name: subscription_seat
    unit: month
    aggregation: sum
    dimensions:
      - plan_tier
  - name: custom_connectors
    unit: connector
    aggregation: count
    dimensions:
      - project
  - name: projects
    unit: project
    aggregation: count
    dimensions:
      - plan_tier
principles:
  - name: Visibility
    description: StackOne's dashboard reports action-call counts per linked account, connector, and project; export these via the platform API to attribute spend back to the tenant or feature consuming the call.
  - name: Allocation
    description: Tag every linked account with the consuming product, tenant, and environment so the action-call meter can roll up by team. StackOne's project abstraction is the natural allocation boundary - one project per consuming product or workspace keeps cost lines clean.
  - name: Optimization
    description: Cache idempotent reads (employee lookups, candidate metadata) at the consumer side, batch list endpoints with cursoring rather than re-fetching, and prefer the Unified API over per-vendor connectors to amortize action-call cost across providers. Negotiate volume discounts on action-call rate at Core or Enterprise tier.
  - name: Accountability
    description: Platform / integrations team owns the StackOne contract and tier choice; consuming product teams own the action-call volume their workflows generate and review monthly meter exports.
maintainers:
  - name: StackOne
    url: https://www.stackone.com/
