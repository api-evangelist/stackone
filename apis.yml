      comments, and status tracking.
  - aid: stackone:messaging-api
    name: StackOne Unified Messaging API
    tags:
      - Messaging
      - Communication
      - Chat
      - Unified API
    humanURL: https://docs.stackone.com/messaging/introduction
    properties:
      - url: https://docs.stackone.com/messaging/introduction
