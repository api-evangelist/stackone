apis:
  - aid: stackone:stackone
    name: StackOne
    tags:
      - Integrations
      - iPaaS
    humanURL: ' https://www.stackone.com/'
    properties:
      - url: ' https://www.stackone.com/'
        type: Documentation
    description: >-
      One integration platform, two powerful interfaces: Unified APIs for SaaS
      products, and AI Agent Actions. Ship hundreds of integrations in days.
  - aid: stackone:hris-api
    name: StackOne Unified HRIS API
    tags:
      - HRIS
      - Human Resources
      - Employees
      - Unified API
    humanURL: https://docs.stackone.com/hris/introduction
    properties:
      - url: https://docs.stackone.com/hris/introduction
        type: Documentation
      - url: https://docs.stackone.com/hris/api-reference/employees/list-employees
        type: APIReference
    description: >-
      StackOne Unified HRIS API provides a single, standardized interface to
      interact with multiple HR information system providers, normalizing data
      models for employee data, shifts, time-off, documents, and benefits across
      platforms.
  - aid: stackone:ats-api
    name: StackOne Unified ATS API
    tags:
      - ATS
      - Applicant Tracking
      - Recruitment
      - Unified API
    humanURL: https://docs.stackone.com/ats/introduction
    properties:
      - url: https://docs.stackone.com/ats/introduction
        type: Documentation
      - url: https://docs.stackone.com/ats/api-reference/jobs/list-jobs
        type: APIReference
    description: >-
      StackOne Unified ATS API standardizes recruitment workflows across
      applicant tracking system providers, providing consistent data models for
      candidates, job postings, applications, and hiring pipeline management.
  - aid: stackone:crm-api
    name: StackOne Unified CRM API
    tags:
      - CRM
      - Customer Relationship Management
      - Contacts
      - Unified API
    humanURL: https://docs.stackone.com/crm/introduction
    properties:
      - url: https://docs.stackone.com/crm/introduction
        type: Documentation
      - url: https://docs.stackone.com/crm/api-reference/contacts/creates-a-new-contact
        type: APIReference
    description: >-
      StackOne Unified CRM API provides a standardized interface for managing
      customer contacts, accounts, and opportunities across multiple CRM
      platforms, ensuring a consistent view of customer data.
  - aid: stackone:lms-api
    name: StackOne Unified LMS API
    tags:
      - LMS
      - Learning Management
      - Courses
      - Unified API
    humanURL: https://docs.stackone.com/lms/introduction
    properties:
      - url: https://docs.stackone.com/lms/introduction
        type: Documentation
    description: >-
      StackOne Unified LMS API standardizes learning management across
      platforms, streamlining course delivery, user progress tracking, content
      management, and assignments with consistent data models across LMS and
      learning content providers.
  - aid: stackone:iam-api
    name: StackOne Unified IAM API
    tags:
      - IAM
      - Identity
      - Access Management
      - Unified API
    humanURL: https://docs.stackone.com/iam/introduction
    properties:
      - url: https://docs.stackone.com/iam/introduction
        type: Documentation
    description: >-
      StackOne Unified IAM API provides a standardized interface for identity
      and access management across providers, with comprehensive user
      management, role and permission mapping, group management, and resource
      access control.
  - aid: stackone:documents-api
    name: StackOne Unified Documents API
    tags:
      - Documents
      - Files
      - Knowledge Management
      - Unified API
    humanURL: https://docs.stackone.com/documents/introduction
    properties:
      - url: https://docs.stackone.com/documents/introduction
        type: Documentation
    description: >-
      StackOne Unified Documents API provides a standardized interface for file
      and knowledge management across platforms like Google Drive, SharePoint,
      Dropbox, and Box, with consistent data models for drives, folders, and
      documents.
  - aid: stackone:marketing-api
    name: StackOne Unified Marketing API
    tags:
      - Marketing
